name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0)'
        required: true
        type: string

jobs:
  build-and-upload:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        
      - name: Install dependencies (Wally)
        run: wally install
        
      - name: Fix Wally Requires for Darklua
        run: python requires.py
        
      - name: Build MonoUI with Darklua
        run: darklua process src/init.lua Release.luau

      - name: Build Vanity with Darklua
        run: darklua process modules/Vanity/init.lua Vanity.luau

      - name: Build Lead with Darklua
        run: darklua process modules/Lead/init.lua Lead.luau
        
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: |
            Release.luau
            Vanity.luau
            Lead.luau
